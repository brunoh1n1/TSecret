apiVersion: v1
kind: Namespace
metadata:
  name: tsecret-system
  labels:
    app.kubernetes.io/name: tsecret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsecret-operator
  namespace: tsecret-system
  labels:
    app: tsecret-operator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tsecret-operator
  template:
    metadata:
      labels:
        app: tsecret-operator
    spec:
      serviceAccountName: tsecret-operator
      containers:
        - name: manager
          image: ghcr.io/brunoh1n1/tsecret:latest
          env:
            - name: TSECRET_INJECTOR_IMAGE
              value: ghcr.io/brunoh1n1/tsecret:latest
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --webhook-port=9443
            - --leader-elect=true
            - --log-level=info
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
            - containerPort: 9443
              name: webhook
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: tsecret-webhook-certs
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
