apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: tsecret-mutating-webhook
webhooks:
  - name: tsecret-injector.tsecret.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 5
    clientConfig:
      service:
        name: tsecret-webhook
        namespace: tsecret-system
        path: /mutate-pods
        port: 443
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    namespaceSelector:
      matchExpressions:
        - key: tsecret.io/inject
          operator: In
          values: ["enabled"]
---
apiVersion: v1
kind: Service
metadata:
  name: tsecret-webhook
  namespace: tsecret-system
spec:
  selector:
    app: tsecret-operator
  ports:
    - port: 443
      targetPort: 9443
      protocol: TCP
