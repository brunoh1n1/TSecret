# Deployment my-app — injeção TSecret via volume tmpfs (TSecret criado pelo TSecretSync)
#
# Pré-requisitos:
#   kubectl label namespace default tsecret.io/inject=enabled
#   kubectl apply -f config/samples/tsecret-workload-rbac.yaml
#   kubectl apply -f config/samples/vault-token.yaml
#   kubectl apply -f config/samples/tsecretstore-vault.yaml
#   kubectl apply -f config/samples/tsecretsync.yaml   # cria TSecret db-credentials
#   Secret tsecret-master-key no namespace (kubectl create secret generic ...)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: default
  labels:
    app: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      serviceAccountName: tsecret-workload
      containers:
        - name: app
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "DB_PASSWORD=$(cat /var/run/tsecret/db-credentials/DB_PASSWORD)"
              echo "DB_PASSWORD2=$(cat /var/run/tsecret/db-credentials/DB_PASSWORD2)"
              sleep 3600
          volumeMounts:
            - name: db-credentials
              mountPath: /var/run/tsecret/db-credentials
              readOnly: true
      volumes:
        - name: db-credentials
          secret:
            secretName: db-credentials
