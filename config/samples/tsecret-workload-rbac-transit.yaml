# RBAC for workloads using Vault Transit (DEK wrapped in tsecret-system, no plaintext master key).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tsecret-workload
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tsecret-workload
  namespace: default
rules:
  - apiGroups: ["tsecret.io"]
    resources: ["tsecrets"]
    verbs: ["get"]
  - apiGroups: ["tsecret.io"]
    resources: ["tsecretstores"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-token"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tsecret-workload
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tsecret-workload
subjects:
  - kind: ServiceAccount
    name: tsecret-workload
    namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tsecret-workload-wrapped-dek
  namespace: tsecret-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["tsecret-wrapped-dek"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tsecret-workload-wrapped-dek
  namespace: tsecret-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tsecret-workload-wrapped-dek
subjects:
  - kind: ServiceAccount
    name: tsecret-workload
    namespace: default
