# TSecret manual (valores já criptografados com tsecret-master-key)
apiVersion: tsecret.io/v1alpha1
kind: TSecret
metadata:
  name: my-app-secrets
  namespace: default
spec:
  encryptionRef:
    provider: sealed-secret
    name: tsecret-master-key
  data:
    DB_PASSWORD:
      value: "dHNlY3JldDp4Y2hhY2hhMjAtcG9seTEzMDU6..."  # substituir pelo ciphertext real
      algorithm: xchacha20-poly1305
      keyRef: tsecret-master-key
    API_TOKEN:
      value: "dHNlY3JldDp4Y2hhY2hhMjAtcG9seTEzMDU6..."  # substituir pelo ciphertext real
      algorithm: xchacha20-poly1305
      keyRef: tsecret-master-key
---
# Pod consumindo TSecret via volume (recomendado)
# Pré-requisitos:
#   kubectl label namespace default tsecret.io/inject=enabled
#   Secret tsecret-master-key + ServiceAccount tsecret-workload (RBAC abaixo)
apiVersion: v1
kind: Pod
metadata:
  name: my-app-volume
  namespace: default
spec:
  serviceAccountName: tsecret-workload
  containers:
    - name: app
      image: my-app:latest
      volumeMounts:
        - name: secrets
          mountPath: /var/run/tsecret/my-app-secrets
          readOnly: true
  volumes:
    - name: secrets
      secret:
        secretName: my-app-secrets
---
# Export opcional de env em runtime (sem plaintext no spec)
# apiVersion: v1
# kind: Pod
# metadata:
#   name: my-app-with-env
#   annotations:
#     tsecret.io/export-env: "true"
#     tsecret.io/entrypoint.app: /entrypoint.sh run
# spec:
#   serviceAccountName: tsecret-workload
#   containers:
#     - name: app
#       image: my-app:latest
#       volumeMounts:
#         - name: secrets
#           mountPath: /var/run/tsecret/my-app-secrets
#           readOnly: true
#   volumes:
#     - name: secrets
#       secret:
#         secretName: my-app-secrets
---
# RBAC para init container /tsecret-inject (get TSecret + master key)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tsecret-workload
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tsecret-workload
  namespace: default
rules:
  - apiGroups: ["tsecret.io"]
    resources: ["tsecrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tsecret-workload
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tsecret-workload
subjects:
  - kind: ServiceAccount
    name: tsecret-workload
    namespace: default
