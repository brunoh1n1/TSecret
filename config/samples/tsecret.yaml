# TSecret MANUAL — use apenas se NÃO estiver usando TSecretSync.
# Com Vault + TSecretSync, o TSecret (ex.: db-credentials) é criado automaticamente;
# veja config/samples/tsecretsync.yaml e my-app-deploy.yaml.
#
# Gere ciphertext com a mesma tsecret-master-key do namespace:
#
#   KEY_B64=$(kubectl get secret tsecret-master-key -n default -o jsonpath='{.data.encryption-key}')
#   go run ./cmd/encrypt -key-b64 "$KEY_B64" \
#     DB_PASSWORD=minha-senha-db API_TOKEN=token-api-12345
#
# Cole os valores gerados em spec.data.*.value abaixo (não use placeholders com "...").
apiVersion: tsecret.io/v1alpha1
kind: TSecret
metadata:
  name: my-app-secrets
  namespace: default
spec:
  encryptionRef:
    provider: sealed-secret
    name: tsecret-master-key
  data:
    DB_PASSWORD:
      value: "REPLACE_WITH_ENCRYPT_OUTPUT"
      algorithm: xchacha20-poly1305
      keyRef: tsecret-master-key
    API_TOKEN:
      value: "REPLACE_WITH_ENCRYPT_OUTPUT"
      algorithm: xchacha20-poly1305
      keyRef: tsecret-master-key
