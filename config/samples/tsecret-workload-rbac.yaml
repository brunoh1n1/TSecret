# RBAC para o init container /tsecret-inject (get TSecret + master key).
# Use com TSecret criado pelo TSecretSync (ex.: db-credentials) ou TSecret manual.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tsecret-workload
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tsecret-workload
  namespace: default
rules:
  - apiGroups: ["tsecret.io"]
    resources: ["tsecrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tsecret-workload
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tsecret-workload
subjects:
  - kind: ServiceAccount
    name: tsecret-workload
    namespace: default
