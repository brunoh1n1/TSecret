# TSecretSync with Vault Transit envelope encryption (no plaintext master key in cluster)
apiVersion: tsecret.io/v1alpha1
kind: TSecretSync
metadata:
  name: db-pass-sync
  namespace: default
spec:
  secretStoreRef:
    name: vault-backend
    kind: TSecretStore
  target:
    name: db-credentials
  encryptionRef:
    provider: vault-transit
    name: tsecret-kek
    vaultTransit:
      storeRef:
        name: vault-backend
        kind: TSecretStore
      wrappedKeySecret:
        name: tsecret-wrapped-dek
        key: ciphertext
        namespace: tsecret-system
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: db-pass
        property: value
    - secretKey: DB_PASSWORD2
      remoteRef:
        key: db-pass2
        property: value
  refreshInterval: "30s"
