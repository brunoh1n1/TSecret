# TSecretStore → HashiCorp Vault in-cluster (KV v2)
# Pré-requisitos: Secret vault-token + paths db-pass / db-pass2 no Vault
apiVersion: tsecret.io/v1alpha1
kind: TSecretStore
metadata:
  name: vault-backend
  namespace: default
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
  refreshInterval: "60s"
