# TSecretStore → HashiCorp Vault (KV v2)
# Provider externo testado end-to-end neste projeto.
#
# Pré-requisitos:
#   - Secret com token: vault-token (key: token)
#   - path = mount KV v2 apenas (ex.: "secret"), sem sufixo /data
#   - Segredo no Vault: vault kv put secret/my-key value='...'
#     → lido internamente como secret/data/my-key
apiVersion: tsecret.io/v1alpha1
kind: TSecretStore
metadata:
  name: vault-backend
  namespace: default
spec:
  provider:
    vault:
      server: "https://vault.example.com"
      path: "secret"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
  refreshInterval: "60s"
---
# Alternativa (NÃO implementada ainda — roadmap):
# auth:
#   kubernetes:
#     mountPath: "kubernetes"
#     role: "my-app-role"
---
# ClusterTSecretStore → AWS Secrets Manager
# Código presente; E2E não validado neste repositório.
apiVersion: tsecret.io/v1alpha1
kind: ClusterTSecretStore
metadata:
  name: aws-secrets
spec:
  provider:
    aws:
      region: "us-east-1"
      auth:
        role: "arn:aws:iam::123456789:role/tsecret-role"
  refreshInterval: "120s"
---
# TSecretStore → Azure Key Vault
# Código presente; E2E não validado neste repositório.
apiVersion: tsecret.io/v1alpha1
kind: TSecretStore
metadata:
  name: azure-keyvault
  namespace: production
spec:
  provider:
    azure:
      vaultUrl: "https://my-vault.vault.azure.net"
      tenantId: "00000000-0000-0000-0000-000000000000"
      auth:
        useManagedIdentity: true
