# TSecretSync: Vault → TSecret (fluxo testado com KV v2)
apiVersion: tsecret.io/v1alpha1
kind: TSecretSync
metadata:
  name: sync-app-secrets
  namespace: default
spec:
  secretStoreRef:
    name: vault-backend
    kind: TSecretStore
  target:
    name: my-app-secrets
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: db-pass
        property: value
    - secretKey: DB_PASSWORD2
      remoteRef:
        key: db-pass2
        property: value
  refreshInterval: "1h"
---
# TSecretSync via ClusterTSecretStore (AWS — não testado E2E)
apiVersion: tsecret.io/v1alpha1
kind: TSecretSync
metadata:
  name: sync-from-aws
  namespace: staging
spec:
  secretStoreRef:
    name: aws-secrets
    kind: ClusterTSecretStore
  target:
    name: aws-pulled-secrets
  data:
    - secretKey: REDIS_URL
      remoteRef:
        key: "staging/redis"
        property: "connection_string"
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: "staging/smtp"
        property: "password"
  refreshInterval: "30m"
