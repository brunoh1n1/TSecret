# Deployment de teste — injeção TSecret via volume tmpfs + export env opcional
#
# Pré-requisitos:
#   kubectl label namespace default tsecret.io/inject=enabled
#   kubectl apply -f config/samples/tsecret.yaml          # RBAC tsecret-workload
#   TSecret db-credentials no namespace (via TSecretSync ou manual)
#   Secret tsecret-master-key no namespace
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-tsecret
  namespace: default
  labels:
    app: nginx-tsecret
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-tsecret
  template:
    metadata:
      labels:
        app: nginx-tsecret
      annotations:
        # Opcional: export env no runtime via load-env.sh (sem plaintext no spec)
        tsecret.io/export-env: "true"
        tsecret.io/entrypoint.nginx: /docker-entrypoint.sh nginx -g 'daemon off;'
    spec:
      serviceAccountName: tsecret-workload
      containers:
        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: db-credentials
              mountPath: /var/run/tsecret/db-credentials
              readOnly: true
      volumes:
        - name: db-credentials
          secret:
            secretName: db-credentials
