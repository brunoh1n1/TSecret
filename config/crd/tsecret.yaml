apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tsecrets.tsecret.io
spec:
  group: tsecret.io
  names:
    kind: TSecret
    listKind: TSecretList
    plural: tsecrets
    singular: tsecret
    shortNames:
      - ts
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
        - name: Status
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - encryptionRef
                - data
              properties:
                encryptionRef:
                  type: object
                  required:
                    - provider
                    - name
                  properties:
                    provider:
                      type: string
                      enum:
                        - sealed-secret
                        - aws-kms
                        - azure-keyvault
                        - gcp-kms
                        - vault-transit
                    name:
                      type: string
                      maxLength: 253
                    namespace:
                      type: string
                data:
                  type: object
                  additionalProperties:
                    type: object
                    required:
                      - value
                      - algorithm
                      - keyRef
                    properties:
                      value:
                        type: string
                        description: Base64-encoded encrypted ciphertext
                      algorithm:
                        type: string
                        enum:
                          - xchacha20-poly1305
                          - chacha20-poly1305
                      keyRef:
                        type: string
                        maxLength: 253
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                lastEncryptedAt:
                  type: string
                  format: date-time
                keyVersion:
                  type: string
