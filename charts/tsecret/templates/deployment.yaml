apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsecret-operator
  namespace: {{ include "tsecret.namespace" . }}
  labels:
    {{- include "tsecret.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tsecret.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tsecret.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "tsecret.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: TSECRET_INJECTOR_IMAGE
              value: {{ include "tsecret.injectorImage" . | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - --metrics-bind-address=:{{ .Values.operator.metricsPort }}
            - --health-probe-bind-address=:{{ .Values.operator.healthPort }}
            - --webhook-port={{ .Values.operator.webhookPort }}
            - --leader-elect={{ .Values.operator.leaderElect }}
            - --log-level={{ .Values.operator.logLevel }}
          ports:
            - name: metrics
              containerPort: {{ .Values.operator.metricsPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.operator.healthPort }}
              protocol: TCP
            - name: webhook
              containerPort: {{ .Values.operator.webhookPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: tsecret-webhook-certs
            optional: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
