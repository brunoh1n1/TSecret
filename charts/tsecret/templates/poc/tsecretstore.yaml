{{- if and .Values.poc.enabled .Values.poc.demo.enabled }}
apiVersion: tsecret.io/v1alpha1
kind: TSecretStore
metadata:
  name: {{ .Values.poc.demo.storeName }}
  namespace: {{ include "tsecret.pocNamespace" . }}
  labels:
    {{- include "tsecret.labels" . | nindent 4 }}
    app.kubernetes.io/component: poc-demo
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "25"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  provider:
    vault:
      server: {{ .Values.poc.vault.existing.address | quote }}
      path: {{ .Values.poc.vault.existing.kvMount | quote }}
      auth:
        tokenSecretRef:
          name: {{ .Values.poc.vault.auth.existingSecret.name }}
          key: {{ .Values.poc.vault.auth.existingSecret.key }}
  refreshInterval: "60s"
{{- end }}
