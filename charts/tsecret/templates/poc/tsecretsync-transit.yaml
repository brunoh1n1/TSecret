{{- if and .Values.poc.enabled .Values.poc.demo.enabled (eq .Values.poc.encryption.mode "vault-transit") }}
apiVersion: tsecret.io/v1alpha1
kind: TSecretSync
metadata:
  name: {{ .Values.poc.demo.syncName }}
  namespace: {{ include "tsecret.pocNamespace" . }}
  labels:
    {{- include "tsecret.labels" . | nindent 4 }}
    app.kubernetes.io/component: poc-demo
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "30"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  secretStoreRef:
    name: {{ .Values.poc.demo.storeName }}
    kind: TSecretStore
  target:
    name: {{ .Values.poc.demo.targetName }}
  encryptionRef:
    provider: vault-transit
    name: {{ .Values.poc.vault.transitBootstrap.keyName }}
    vaultTransit:
      storeRef:
        name: {{ .Values.poc.demo.storeName }}
        kind: TSecretStore
      wrappedKeySecret:
        name: {{ .Values.poc.vault.transitBootstrap.wrappedSecretName }}
        key: ciphertext
        namespace: {{ include "tsecret.namespace" . }}
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: db-pass
        property: value
    - secretKey: DB_PASSWORD2
      remoteRef:
        key: db-pass2
        property: value
  refreshInterval: "30s"
{{- end }}
