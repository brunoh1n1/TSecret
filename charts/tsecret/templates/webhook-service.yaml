{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.webhook.serviceName }}
  namespace: {{ include "tsecret.namespace" . }}
  labels:
    {{- include "tsecret.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "tsecret.selectorLabels" . | nindent 4 }}
  ports:
    - name: webhook
      port: {{ .Values.webhook.servicePort }}
      targetPort: {{ .Values.operator.webhookPort }}
      protocol: TCP
{{- end }}
