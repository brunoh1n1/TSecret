# Default values for the TSecret operator Helm chart.
# See charts/tsecret/README.md for PoC options (Vault, External Secrets).

nameOverride: ""
fullnameOverride: ""

# Operator namespace (created when createNamespace=true).
namespace: tsecret-system
createNamespace: true

image:
  repository: ghcr.io/brunoh1n1/tsecret
  tag: "" # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 2

serviceAccount:
  create: true
  name: tsecret-operator
  annotations: {}

rbac:
  create: true

operator:
  leaderElect: true
  logLevel: info
  metricsPort: 8080
  healthPort: 8081
  webhookPort: 9443
  injectorImage: "" # defaults to same image as operator

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

webhook:
  enabled: true
  name: tsecret-mutating-webhook
  serviceName: tsecret-webhook
  servicePort: 443
  failurePolicy: Fail
  timeoutSeconds: 5
  # TLS is managed automatically by the operator (self-signed CA, Kyverno-style).
  # No cert-manager or bootstrap script required.

# Label namespaces where pod injection is enabled.
injection:
  enabled: false
  labelKey: tsecret.io/inject
  labelValue: enabled
  # When set, creates Namespace resources with the injection label.
  namespaces: []
  # Example: ["default", "staging"]

# ---------------------------------------------------------------------------
# PoC / lab stack (disabled by default)
#
# Vault and External Secrets Operator are NOT bundled in this chart.
# Enable poc.enabled only in test clusters. For production:
#   - Install TSecret with poc.enabled=false
#   - Point poc.vault.existing at your Vault
#   - Supply Vault credentials via existing Secret or your own ESO flow
# ---------------------------------------------------------------------------
poc:
  enabled: false

  # Namespace for demo TSecretStore, TSecretSync, workload RBAC and sample app.
  namespace: default
  createNamespace: true

  encryption:
    # vault-transit (recommended) | sealed-secret (lab only)
    mode: vault-transit

  vault:
    # Use an existing Vault deployment (recommended).
    existing:
      address: "http://vault.vault.svc.cluster.local:8200"
      kvMount: secret
      namespace: vault
      pod: vault-0

    auth:
      # direct        — chart creates a Kubernetes Secret with token (lab only)
      # existingSecret — use a Secret you already manage
      # externalSecret — chart creates an ExternalSecret (requires ESO in cluster)
      method: direct
      token: root
      existingSecret:
        name: vault-token
        key: token
        namespace: "" # defaults to poc.namespace

    # Bootstrap jobs (require kubectl exec access to Vault pod).
    kvBootstrap:
      enabled: true
      secrets:
        - path: db-pass
          value: minha-senha
        - path: db-pass2
          value: outra-senha

    transitBootstrap:
      enabled: true
      keyName: tsecret-kek
      wrappedSecretName: tsecret-wrapped-dek

  externalSecrets:
    # When true, chart renders ExternalSecret for vault-token (does NOT install ESO).
    # Install ESO separately, or use poc.installCommands from README.
    enabled: false
    # ClusterSecretStore name for Vault (must exist or be created by poc templates).
    clusterSecretStore: vault-poc
    externalSecret:
      name: vault-token
      refreshInterval: 1h
    # Optional: render a ClusterSecretStore for in-cluster Vault dev (lab).
    createClusterSecretStore: false
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: secret
      tokenSecretRef:
        name: vault-token
        key: token

  demo:
    enabled: true
    storeName: vault-backend
    syncName: db-pass-sync
    targetName: db-credentials
  workload:
    serviceAccountName: tsecret-workload
    createRBAC: true
  sampleApp:
    enabled: true
    name: my-app
    image: busybox:1.36
