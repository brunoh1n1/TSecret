apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tsecretsyncs.tsecret.io
spec:
  group: tsecret.io
  names:
    kind: TSecretSync
    listKind: TSecretSyncList
    plural: tsecretsyncs
    singular: tsecretsync
    shortNames:
      - tss-sync
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Status
          type: string
          jsonPath: .status.status
        - name: Last Sync
          type: date
          jsonPath: .status.lastSyncedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - secretStoreRef
                - target
                - data
              properties:
                secretStoreRef:
                  type: object
                  required:
                    - name
                    - kind
                  properties:
                    name:
                      type: string
                    kind:
                      type: string
                      enum:
                        - TSecretStore
                        - ClusterTSecretStore
                target:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                data:
                  type: array
                  items:
                    type: object
                    required:
                      - secretKey
                      - remoteRef
                    properties:
                      secretKey:
                        type: string
                      remoteRef:
                        type: object
                        required:
                          - key
                        properties:
                          key:
                            type: string
                          property:
                            type: string
                          version:
                            type: string
                refreshInterval:
                  type: string
                encryptionRef:
                  type: object
                  properties:
                    provider:
                      type: string
                      enum:
                        - sealed-secret
                        - vault-transit
                    name:
                      type: string
                    namespace:
                      type: string
                    vaultTransit:
                      type: object
                      required:
                        - storeRef
                        - wrappedKeySecret
                      properties:
                        storeRef:
                          type: object
                          required:
                            - name
                            - kind
                          properties:
                            name:
                              type: string
                            kind:
                              type: string
                              enum:
                                - TSecretStore
                                - ClusterTSecretStore
                        wrappedKeySecret:
                          type: object
                          required:
                            - name
                            - key
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                            namespace:
                              type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                status:
                  type: string
                lastSyncedAt:
                  type: string
                  format: date-time
                syncedGeneration:
                  type: integer
                  format: int64
